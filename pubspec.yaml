name: wavy
description: "WAVY - Live Audio Social Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Real-time & Networking
  socket_io_client: ^2.0.3+1
  http: ^1.1.0
  
  # Audio & Media
  just_audio: ^0.9.46
  livekit_client: ^2.0.0
  file_picker: ^8.1.2
  
  # Audio streaming support
  flutter_sound: ^9.2.13
  audio_session: ^0.1.16
  
  # State Management
  provider: ^6.1.1
  
  # Permissions & Storage
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  
  # UI & Animations
  flutter_animate: ^4.3.0
  
  # Utils
  uuid: ^4.2.1
  xml: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/music/
